[theme]
base = "dark"
primaryColor = "#22C55E"
backgroundColor = "#090E17"
secondaryBackgroundColor = "#121A27"
textColor = "#F4F7FB"
borderColor = "#273449"
showWidgetBorder = true
baseRadius = "0.75rem"

[server]
headless = true
address = "0.0.0.0"
port = 8502
sslCertFile = "certs/adaptive_vr_server.crt"
sslKeyFile = "certs/adaptive_vr_server.key"
